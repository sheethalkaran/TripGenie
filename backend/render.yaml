services:
  - type: web
    name: tripgenie-backend
    runtime: python
    rootDir: backend 
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false   # You will set this manually in Render dashboard
    autoDeploy: true
    

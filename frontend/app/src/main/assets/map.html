<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=3,user-scalable=yes">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#e8e0d8}
#map{position:absolute;top:0;left:0;width:100%;height:100%;overflow:hidden;cursor:grab}
#map.dragging{cursor:grabbing}
canvas{position:absolute;top:0;left:0;pointer-events:none}
.tile{position:absolute;width:256px;height:256px;image-rendering:auto}
.popup{position:absolute;background:white;border-radius:10px;padding:10px 14px;
  box-shadow:0 4px 16px rgba(0,0,0,.25);font-family:sans-serif;font-size:13px;
  line-height:1.5;max-width:220px;z-index:1000;pointer-events:none;
  transform:translate(-50%,-110%)}
.popup::after{content:'';position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);
  border:8px solid transparent;border-top-color:white;border-bottom:0}
#ui{position:absolute;top:10px;right:10px;z-index:100;display:flex;flex-direction:column;gap:6px}
.btn{width:36px;height:36px;background:white;border:none;border-radius:8px;
  font-size:18px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.2);
  display:flex;align-items:center;justify-content:center;line-height:1}
</style>
</head>
<body>
<div id="map">
  <canvas id="overlay"></canvas>
</div>
<div id="ui">
  <button class="btn" onclick="zoom(1)">+</button>
  <button class="btn" onclick="zoom(-1)">−</button>
</div>
<script>
var TILE='https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png';
var SUBS=['a','b','c'];
var mapDiv=document.getElementById('map');
var canvas=document.getElementById('overlay');
var ctx=canvas.getContext('2d');
var z=13,cx=0,cy=0,W=0,H=0;
var markers=[],routes=[];
var popup=null;
var drag={active:false,sx:0,sy:0,ox:0,oy:0};
var tileCache={};

function latLngToWorld(lat,lng,zoom){
  var n=Math.pow(2,zoom);
  var x=(lng+180)/360*n;
  var sinLat=Math.sin(lat*Math.PI/180);
  var y=(1-Math.log((sinLat+1)/Math.cos(lat*Math.PI/180))/Math.PI)/2*n;
  return{x:x*256,y:y*256};
}
function worldToScreen(wx,wy){return{x:wx-cx+W/2,y:wy-cy+H/2};}
function screenToWorld(sx,sy){return{x:sx+cx-W/2,y:sy+cy-H/2};}

function resize(){
  W=mapDiv.clientWidth;H=mapDiv.clientHeight;
  canvas.width=W;canvas.height=H;
  render();
}
window.addEventListener('resize',resize);

function getTile(tx,ty,tz){
  var key=tz+'/'+tx+'/'+ty;
  if(tileCache[key]) return tileCache[key];
  var img=new Image();
  var s=SUBS[Math.abs(tx+ty)%3];
  img.crossOrigin='anonymous';
  img.src=TILE.replace('{s}',s).replace('{z}',tz).replace('{x}',tx).replace('{y}',ty);
  img.onload=function(){tileCache[key]=img;render();};
  tileCache[key]=null;
  return null;
}

function render(){
  if(!W||!H) return;
  ctx.clearRect(0,0,W,H);
  var n=Math.pow(2,z);
  var tileX0=Math.floor((cx-W/2)/256);
  var tileY0=Math.floor((cy-H/2)/256);
  var tileX1=Math.ceil((cx+W/2)/256);
  var tileY1=Math.ceil((cy+H/2)/256);
  for(var tx=tileX0;tx<=tileX1;tx++){
    for(var ty=tileY0;ty<=tileY1;ty++){
      var ntx=((tx%n)+n)%n;
      var nty=((ty%n)+n)%n;
      if(nty<0||nty>=n) continue;
      var img=getTile(ntx,nty,z);
      if(img){
        var sx=tx*256-cx+W/2;
        var sy=ty*256-cy+H/2;
        ctx.drawImage(img,Math.round(sx),Math.round(sy),256,256);
      }
    }
  }
  // Draw routes
  routes.forEach(function(r){
    if(r.pts.length<2) return;
    ctx.beginPath();
    ctx.strokeStyle=r.col;
    ctx.lineWidth=3;
    ctx.setLineDash([8,5]);
    ctx.globalAlpha=0.9;
    r.pts.forEach(function(p,i){
      var w=latLngToWorld(p[0],p[1],z);
      var s=worldToScreen(w.x,w.y);
      if(i===0) ctx.moveTo(s.x,s.y); else ctx.lineTo(s.x,s.y);
    });
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.globalAlpha=1;
  });
  // Draw markers
  markers.forEach(function(m){
    var w=latLngToWorld(m.lat,m.lng,z);
    var s=worldToScreen(w.x,w.y);
    ctx.beginPath();
    ctx.arc(s.x,s.y,10,0,Math.PI*2);
    ctx.fillStyle=m.col;
    ctx.fill();
    ctx.strokeStyle='white';
    ctx.lineWidth=2.5;
    ctx.stroke();
  });
}

// Touch/drag
mapDiv.addEventListener('mousedown',function(e){
  drag.active=true;drag.sx=e.clientX;drag.sy=e.clientY;
  drag.ox=cx;drag.oy=cy;mapDiv.classList.add('dragging');
});
mapDiv.addEventListener('mousemove',function(e){
  if(!drag.active) return;
  cx=drag.ox-(e.clientX-drag.sx);
  cy=drag.oy-(e.clientY-drag.sy);
  render();
});
mapDiv.addEventListener('mouseup',function(){drag.active=false;mapDiv.classList.remove('dragging');});

mapDiv.addEventListener('touchstart',function(e){
  if(e.touches.length===1){
    drag.active=true;drag.sx=e.touches[0].clientX;drag.sy=e.touches[0].clientY;
    drag.ox=cx;drag.oy=cy;
  }
},{passive:true});
mapDiv.addEventListener('touchmove',function(e){
  if(drag.active&&e.touches.length===1){
    cx=drag.ox-(e.touches[0].clientX-drag.sx);
    cy=drag.oy-(e.touches[0].clientY-drag.sy);
    render();
  }
},{passive:true});
mapDiv.addEventListener('touchend',function(){drag.active=false;});

// Zoom
mapDiv.addEventListener('wheel',function(e){
  e.preventDefault();
  zoom(e.deltaY<0?1:-1);
},{passive:false});

function zoom(delta){
  var nz=Math.min(18,Math.max(3,z+delta));
  if(nz===z) return;
  var factor=Math.pow(2,nz-z);
  cx*=factor; cy*=factor;
  z=nz;
  tileCache={};
  render();
}

// Marker click
mapDiv.addEventListener('click',function(e){
  removePopup();
  var rect=mapDiv.getBoundingClientRect();
  var mx=e.clientX-rect.left,my=e.clientY-rect.top;
  for(var i=0;i<markers.length;i++){
    var m=markers[i];
    var w=latLngToWorld(m.lat,m.lng,z);
    var s=worldToScreen(w.x,w.y);
    var dx=s.x-mx,dy=s.y-my;
    if(dx*dx+dy*dy<144){
      showPopup(s.x,s.y,m.popup);
      return;
    }
  }
});

function showPopup(x,y,html){
  removePopup();
  var p=document.createElement('div');
  p.className='popup';
  p.innerHTML=html;
  p.style.left=x+'px';
  p.style.top=y+'px';
  mapDiv.appendChild(p);
  popup=p;
}
function removePopup(){if(popup){popup.remove();popup=null;}}

// Public API called by Android
function initMap(dataJson){
  var data=JSON.parse(dataJson);
  markers=data.markers||[];
  routes=data.routes||[];
  z=data.zoom||13;
  var center=data.center;
  var w=latLngToWorld(center[0],center[1],z);
  cx=w.x; cy=w.y;
  resize();
  // Auto-fit
  if(markers.length>1){
    var lats=markers.map(function(m){return m.lat;});
    var lngs=markers.map(function(m){return m.lng;});
    var minLat=Math.min.apply(null,lats),maxLat=Math.max.apply(null,lats);
    var minLng=Math.min.apply(null,lngs),maxLng=Math.max.apply(null,lngs);
    fitBounds(minLat,minLng,maxLat,maxLng);
  }
}

function fitBounds(minLat,minLng,maxLat,maxLng){
  // Find zoom level
  for(var fz=15;fz>=3;fz--){
    var sw=latLngToWorld(minLat,minLng,fz);
    var ne=latLngToWorld(maxLat,maxLng,fz);
    var pw=Math.abs(ne.x-sw.x),ph=Math.abs(sw.y-ne.y);
    if(pw<W*0.85&&ph<H*0.85){
      z=fz;
      var midLat=(minLat+maxLat)/2,midLng=(minLng+maxLng)/2;
      var mw=latLngToWorld(midLat,midLng,z);
      cx=mw.x;cy=mw.y;
      tileCache={};render();return;
    }
  }
}

// Attribution
var attr=document.createElement('div');
attr.style.cssText='position:absolute;bottom:4px;right:4px;font-size:9px;color:#333;background:rgba(255,255,255,.7);padding:2px 5px;border-radius:3px;z-index:100;';
attr.innerHTML='© <a href="https://openstreetmap.org" style="color:#333">OpenStreetMap</a>';
mapDiv.appendChild(attr);
</script>
</body>
</html>
